services:
  mongo:
    image: mongo:7
    container_name: react-store-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  back-end:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: react-store-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/onlinestore
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-secret}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./back-end/uploads:/app/uploads

  frond-end:
    build:
      context: ./frond-end
      dockerfile: Dockerfile
    container_name: react-store-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - back-end

volumes:
  mongo_data:
